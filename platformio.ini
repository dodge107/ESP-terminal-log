; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Two environments share all common settings via [env] (the unnamed base).
; Board-specific I2C pins and any extra flags are added per environment.
;
; Build a specific target:   pio run -e esp32-c3-devkitm-1
; Upload:                    pio run -e esp32-s3-devkitc-1 --target upload
; Serial monitor:            pio device monitor -e esp32-c3-devkitm-1

; ── Shared base (inherited by every named [env:*]) ────────────────────────────
[env]
framework    = arduino
lib_deps     =
    olikraus/U8g2@^2.35.17
    tzapu/WiFiManager@^2.0.17
monitor_speed = 115200
; USB-CDC boot flags — required on both C3 and S3 for Serial.print to work
; over the native USB port without a separate USB-UART bridge.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── ESP32-C3 DevKitM-1 ───────────────────────────────────────────────────────
; Wiring: VCC→3V3  GND→GND  SDA→GPIO3  SCL→GPIO4
[env:esp32-c3-devkitm-1]
platform = espressif32
board    = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -DI2C_SDA_PIN=3
    -DI2C_SCL_PIN=4

; ── ESP32-S3 DevKitC-1 ───────────────────────────────────────────────────────
; Wiring: VCC→3V3  GND→GND  SDA→GPIO8  SCL→GPIO9
; The S3 has a second I2C-capable peripheral and more GPIO — adjust pins freely.
[env:esp32-s3-devkitc-1]
platform = espressif32
board    = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DI2C_SDA_PIN=8
    -DI2C_SCL_PIN=9
