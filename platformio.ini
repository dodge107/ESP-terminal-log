; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Common settings live in [env] (the unnamed base); board-specific
; I2C pins and extra flags are added in each named [env:*] section.
;
; Build:          pio run -e esp32-c3-devkitm-1
; Upload:         pio run -e esp32-c3-devkitm-1 --target upload
; Serial monitor: pio device monitor -e esp32-c3-devkitm-1

; ── Shared base (inherited by every named [env:*]) ────────────────────────────
[env]
framework    = arduino
lib_deps     =
    olikraus/U8g2@^2.35.17
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.0
monitor_speed = 115200
; USB-CDC boot flags — required for Serial.print to work over the native
; USB port on the C3 without a separate USB-UART bridge.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── ESP32-C3 DevKitM-1 ───────────────────────────────────────────────────────
; Wiring: VCC→3V3  GND→GND  SDA→GPIO3  SCL→GPIO4
[env:esp32-c3-devkitm-1]
platform = espressif32
board    = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -DI2C_SDA_PIN=3
    -DI2C_SCL_PIN=4
    -DLED1_PIN=8
    -DLED2_PIN=9
    -DWAKE_BTN_PIN=5
    -DWAKE_RADAR_PIN=6
